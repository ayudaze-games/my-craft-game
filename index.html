<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Craft Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #78a7ff;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
        }

        /* 🚪 タイトルメニューの画面 */
        #menu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 16, 16, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: 'Arial', sans-serif;
        }

        h1 {
            color: #fff;
            text-shadow: 3px 3px 0px #3f3f3f;
            font-size: 42px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .menu-btn {
            width: 280px;
            padding: 14px;
            margin: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: #5c801e;
            color: white;
            border: 3px solid #3a5213;
            border-radius: 4px;
            text-shadow: 1px 1px 0px #222;
            box-shadow: 0px 4px 0px #2a3d0e;
            transition: all 0.1s ease;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #000;
        }

        /* 👁️ りょうがきょり設定エリアの装飾 */
        .setting-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 15px 25px;
            border-radius: 8px;
            margin: 15px;
            text-align: center;
            color: white;
            font-family: sans-serif;
        }
        .setting-box label {
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px #000;
        }
        .setting-box select {
            padding: 8px 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            border: 2px solid #555;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            width: 240px;
            outline: none;
        }

        /* 🕹️ スマホ用バーチャルパッドのUI設定 */
        #mobile-ui-container {
            display: none; /* 初期は非表示 */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* ゲーム画面のタッチを邪魔しない */
            z-index: 10;
        }

        /* 左側：ジョイスティックの土台 */
        #mobile-joystick-base {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: auto; /* タッチを反応させる */
        }

        /* ジョイスティックのつまみ */
        #mobile-joystick-knob {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transition: transform 0.05s ease;
        }

        /* 右側：大ジャンプボタン */
        #mobile-jump-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #mobile-jump-btn:active {
            background: rgba(255, 255, 255, 0.6);
        }

        /* 🎯 画面中央の十字カーソル */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            opacity: 0.8;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="menu-container">
        <h1>MY CRAFT GAME</h1>

        <div class="setting-box">
            <label for="render-distance-select">👁️ りょうがきょり (描画距離)</label>
            <select id="render-distance-select" onchange="if(window.worldInstance) window.worldInstance.setRenderDistance(this.value);">
                <option value="0">0 (自分の足元だけ - 超軽量)</option>
                <option value="1" selected>1 (周辺1チャンク - 標準軽量)</option>
                <option value="2">2 (周辺2チャンク - 普通)</option>
                <option value="3">3 (周辺3チャンク - 遠くまで見える)</option>
            </select>
        </div>

        <button class="menu-btn" onclick="startSinglePlayer('pc')">💻 PCモードで遊ぶ</button>
        <button class="menu-btn" onclick="startSinglePlayer('mobile')">📱 スマホモードで遊ぶ</button>
        <button class="menu-btn" onclick="startMultiPlayer()" style="background:#1e5c80; border-color:#133a52; box-shadow: 0px 4px 0px #0e2a3d;">🌐 マルチプレイで遊ぶ</button>
    </div>

    <div id="mobile-ui-container">
        <div id="mobile-joystick-base">
            <div id="mobile-joystick-knob"></div>
        </div>
        <div id="mobile-jump-btn">JUMP</div>
    </div>

    <script src="js/player.js"></script>
    <script src="js/world.js"></script>
    <script src="game.js"></script>
    <script src="main.js"></script>

    <script>
        // 全体のモードを管理する変数
        window.isMobileMode = false;
        window.gameMode = 'single';

        // 💻 または 📱 シングルプレイ開始処理
        function startSinglePlayer(mode) {
            window.gameMode = 'single';
            window.isMobileMode = (mode === 'mobile');
            
            // メニュー画面を消す
            document.getElementById('menu-container').style.display = 'none';
            
            // スマホモードならボタン類を表示する
            if (window.isMobileMode) {
                document.getElementById('mobile-ui-container').style.display = 'block';
            }

            // game.js の初期化関数を呼び出してスタート！
            if (typeof window.initGame === 'function') {
                window.initGame();
            }
        }

        // 🌐 マルチプレイ開始処理
        function startMultiPlayer() {
            window.gameMode = 'multi';
            // マルチプレイはデフォルトでPC操作とします
            window.isMobileMode = false;

            document.getElementById('menu-container').style.display = 'none';

            if (typeof window.initGame === 'function') {
                window.initGame();
            }
        }

        // 📱 画面のサイズが変わったときに3Dの比率を直す処理
        window.addEventListener('resize', () => {
            if (window.camera && window.renderer) {
                window.camera.aspect = window.innerWidth / window.innerHeight;
                window.camera.updateProjectionMatrix();
                window.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
