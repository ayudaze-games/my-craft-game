<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>My Craft Game</title>
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background-color: #000; touch-action: none; }
        canvas { display: block; }

        /* 🌳 メニュー画面全体のスタイル */
        #menu-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('img/grass_top.png');
            background-size: 64px;
            background-repeat: repeat;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* 🎮 タイトル文字 */
        h1 {
            color: #fff;
            font-size: 3rem;
            text-shadow: 4px 4px #222;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* ⚙️ 設定エリア */
        .settings-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 8px;
            border: 2px solid #555;
            margin-bottom: 30px;
            color: #fff;
            text-align: center;
        }
        .settings-box label { font-size: 1.1rem; margin-right: 15px; cursor: pointer; }
        .settings-box input { transform: scale(1.3); margin-right: 5px; cursor: pointer; }

        /* 🔘 ボタンの共通スタイル */
        .menu-btn {
            width: 320px;
            padding: 15px;
            margin: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e0e0e0;
            background-color: #4a4a4a;
            border: 3px solid #000;
            border-top-color: #8b8b8b;
            border-left-color: #8b8b8b;
            cursor: pointer;
            text-shadow: 2px 2px #000;
            box-shadow: 0 5px #222;
        }
        .menu-btn:hover {
            background-color: #5c8e32;
            border-top-color: #bee268;
            border-left-color: #bee268;
            color: #fff;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #222;
        }

        /* 🕹️ スマホ用：ジョイスティックの土台 */
        #mobile-joystick-base {
            display: none;
            position: fixed;
            bottom: 50px; left: 50px; 
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            z-index: 1000;
            touch-action: none;
        }

        /* ⚪ スマホ用：内側の丸 */
        #mobile-joystick-knob {
            position: absolute;
            top: 25px; left: 25px; 
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }

        /* 🦘 スマホ用：丸いジャンプボタン（新登場！） */
        #mobile-jump-btn {
            display: none;
            position: fixed;
            bottom: 65px; right: 60px;
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.25);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            line-height: 64px; /* 文字を真ん中に */
            z-index: 1000;
            text-shadow: 1px 1px 3px #000;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }
        #mobile-jump-btn:active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="menu-container">
        <h1>MY CRAFT GAME</h1>

        <div class="settings-box">
            <span style="display:block; margin-bottom: 8px; color: #aaa;">【 操作設定 】</span>
            <label><input type="radio" name="device" value="pc" checked> 💻 パソコン (キーボード)</label>
            <label><input type="radio" name="device" value="mobile"> 📱 スマホ (画面タッチ)</label>
        </div>

        <button class="menu-btn" onclick="startGame('single')">シングルプレイ</button>
        <button class="menu-btn" onclick="startGame('multi')">RenderAyudazeserver (マルチ)</button>
    </div>

    <div id="mobile-joystick-base">
        <div id="mobile-joystick-knob"></div>
    </div>

    <div id="mobile-jump-btn">JUMP</div>

    <script src="js/world.js"></script>
    <script src="js/player.js"></script>
    <script src="game.js"></script>
    <script src="main.js"></script>

    <script>
        window.gameMode = 'single'; 
        window.isMobileMode = false;

        function startGame(mode) {
            window.gameMode = mode;
            
            const selectedDevice = document.querySelector('input[name="device"]:checked').value;
            if (selectedDevice === 'mobile') {
                window.isMobileMode = true;
                // スマホモードの時は操作パッドもジャンプボタンも両方出す！
                document.getElementById('mobile-joystick-base').style.display = 'block';
                document.getElementById('mobile-jump-btn').style.display = 'block';
            }

            document.getElementById('menu-container').style.display = 'none';
            console.log(`🎮 モード: ${window.gameMode} / デバイス: ${selectedDevice} で起動完了！`);
            
            if (typeof window.initGame === 'function') {
                window.initGame();
            }
        }
    </script>
</body>
</html>
