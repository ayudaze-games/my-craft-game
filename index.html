<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Craft Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #78a7ff;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
        }

        /* 🚪 タイトルメニューの画面 */
        #menu-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 16, 16, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: 'Arial', sans-serif;
            overflow-y: auto;
            padding: 20px 0;
        }

        h1 {
            color: #fff;
            text-shadow: 3px 3px 0px #3f3f3f;
            font-size: 36px;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .menu-section-title {
            color: #aaa;
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-btn {
            width: 280px;
            padding: 12px;
            margin: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: #5c801e;
            color: white;
            border: 3px solid #3a5213;
            border-radius: 4px;
            text-shadow: 1px 1px 0px #222;
            box-shadow: 0px 4px 0px #2a3d0e;
            transition: all 0.1s ease;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 0px 0px #000;
        }

        /* 🌐 マルチプレイ用ボタンの色（青ベース） */
        .multi-btn {
            background: #1e5c80; 
            border-color: #133a52; 
            box-shadow: 0px 4px 0px #0e2a3d;
        }

        /* 👁️ りょうがきょり設定エリアの装飾 */
        .setting-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 10px;
            text-align: center;
            color: white;
            font-family: sans-serif;
        }
        .setting-box label {
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            text-shadow: 1px 1px 2px #000;
        }
        .setting-box select {
            padding: 6px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            border: 2px solid #555;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            width: 240px;
            outline: none;
        }

        /* 🕹️ スマホ用バーチャルパッドのUI設定 */
        #mobile-ui-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #mobile-joystick-base {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: auto;
        }

        #mobile-joystick-knob {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transition: transform 0.05s ease;
        }

        #mobile-jump-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 75px;
            height: 75px;
            background: rgba(255, 255, 255, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            text-shadow: 1px 1px 2px #000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #mobile-jump-btn:active {
            background: rgba(255, 255, 255, 0.6);
        }

        /* 🎯 画面中央の十字カーソル */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
            opacity: 0.8;
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>

    <div id="crosshair"></div>

    <div id="menu-container">
        <h1>MY CRAFT GAME</h1>

        <div class="setting-box">
            <label for="render-distance-select">👁️ りょうがきょり (描画距離)</label>
            <select id="render-distance-select" onchange="if(window.worldInstance) window.worldInstance.setRenderDistance(this.value);">
                <option value="0">0 (自分の足元だけ - 超軽量)</option>
                <option value="1" selected>1 (周辺1チャンク - 標準軽量)</option>
                <option value="2">2 (周辺2チャンク - 普通)</option>
                <option value="3">3 (周辺3チャンク - 遠くまで見える)</option>
            </select>
        </div>

        <div class="menu-section-title">👤 シングルプレイ</div>
        <button class="menu-btn" onclick="startGameMode('single', 'pc')">💻 PCモードで遊ぶ</button>
        <button class="menu-btn" onclick="startGameMode('single', 'mobile')">📱 スマホモードで遊ぶ</button>

        <div class="menu-section-title">🌐 マルチプレイ</div>
        <button class="menu-btn multi-btn" onclick="startGameMode('multi', 'pc')">💻 PCでマルチに参戦！</button>
        <button class="menu-btn multi-btn" onclick="startGameMode('multi', 'mobile')">📱 スマホでマルチに参戦！</button>
    </div>

    <div id="mobile-ui-container">
        <div id="mobile-joystick-base">
            <div id="mobile-joystick-knob"></div>
        </div>
        <div id="mobile-jump-btn">JUMP</div>
    </div>

    <script src="js/player.js"></script>
    <script src="js/world.js"></script>
    <script src="game.js"></script>
    <script src="main.js"></script>

    <script>
        window.isMobileMode = false;
        window.gameMode = 'single';

        // 🚀 【新機能】シングル・マルチ、PC・スマホの組み合わせを綺麗に処理する関数
        function startGameMode(gMode, cMode) {
            window.gameMode = gMode; // 'single' または 'multi'
            window.isMobileMode = (cMode === 'mobile'); // スマホ操作なら true
            
            // メニュー画面を消す
            document.getElementById('menu-container').style.display = 'none';
            
            // スマホ操作なら画面に移動用パッドを表示する
            if (window.isMobileMode) {
                document.getElementById('mobile-ui-container').style.display = 'block';
            } else {
                document.getElementById('mobile-ui-container').style.display = 'none';
            }

            // game.js の初期化関数を呼び出してスタート！
            if (typeof window.initGame === 'function') {
                window.initGame();
            }
        }

        window.addEventListener('resize', () => {
            if (window.camera && window.renderer) {
                window.camera.aspect = window.innerWidth / window.innerHeight;
                window.camera.updateProjectionMatrix();
                window.renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
