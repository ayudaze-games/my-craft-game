<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Craft Game</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background-color: #000; }
        canvas { display: block; }

        /* 🌳 メニュー画面全体のスタイル */
        #menu-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('img/grass_top.png');
            background-size: 64px; /* マイクラ風ドット背景 */
            background-repeat: repeat;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        /* 🎮 タイトル文字 */
        h1 {
            color: #fff;
            font-size: 3rem;
            text-shadow: 4px 4px #222;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* ⚙️ 設定エリア（PC/スマホ切り替え） */
        .settings-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 8px;
            border: 2px solid #555;
            margin-bottom: 30px;
            color: #fff;
            text-align: center;
        }
        .settings-box label { font-size: 1.1rem; margin-right: 15px; cursor: pointer; }
        .settings-box input { transform: scale(1.3); margin-right: 5px; cursor: pointer; }

        /* 🔘 ボタンの共通スタイル */
        .menu-btn {
            width: 320px;
            padding: 15px;
            margin: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #e0e0e0;
            background-color: #4a4a4a;
            border: 3px solid #000;
            border-top-color: #8b8b8b;
            border-left-color: #8b8b8b;
            cursor: pointer;
            text-shadow: 2px 2px #000;
            box-shadow: 0 5px #222;
        }
        .menu-btn:hover {
            background-color: #5c8e32; /* ホバー時はマイクラ草色 */
            border-top-color: #bee268;
            border-left-color: #bee268;
            color: #fff;
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #222;
        }

        /* 📱 スマホ用バーチャルパッド（最初は非表示） */
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 30px; left: 30px; width: 150px; height: 150px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            z-index: 1000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <h1>MY CRAFT GAME</h1>

        <div class="settings-box">
            <span style="display:block; margin-bottom: 8px; color: #aaa;">【 操作設定 】</span>
            <label><input type="radio" name="device" value="pc" checked> 💻 パソコン (キーボード)</label>
            <label><input type="radio" name="device" value="mobile"> 📱 スマホ (画面タッチ)</label>
        </div>

        <button class="menu-btn" onclick="startGame('single')">シングルプレイ</button>
        <button class="menu-btn" onclick="startGame('multi')">RenderAyudazeserver (マルチ)</button>
    </div>

    <div id="mobile-controls"></div>

    <script src="js/world.js"></script>
    <script src="js/player.js"></script>
    <script src="game.js"></script>
    <script src="main.js"></script>

    <script>
        // グローバル変数でモードとデバイスを記憶
        window.gameMode = 'single'; 
        window.isMobileMode = false;

        function startGame(mode) {
            window.gameMode = mode;
            
            // スマホモードが選ばれているかチェック
            const selectedDevice = document.querySelector('input[name="device"]:checked').value;
            if (selectedDevice === 'mobile') {
                window.isMobileMode = true;
                document.getElementById('mobile-controls').style.display = 'block';
                alert('📱スマホモード：画面のタッチ移動を有効化します（この後プログラムを追加します）');
            }

            // メニュー画面を非表示にしてゲームの世界を表示！
            document.getElementById('menu-container').style.display = 'none';
            console.log(`🎮 モード: ${window.gameMode} / デバイス: ${selectedDevice} で起動完了！`);
        }
    </script>
</body>
</html>
